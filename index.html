<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveSight // Tactical Fusion System</title>
    
    <!-- Google Fonts for Tactical UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style.css">

    <!-- Three.js and OrbitControls CDN for 3D Tactical City Map -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="hud-container">
        <!-- Dashboard Header -->
        <header class="tactical-header">
            <div class="header-left">
                <div class="logo-accent"></div>
                <h1>HIVESIGHT <span class="header-sub">// COOPERATIVE TARGET ACQUISITION SYSTEM</span></h1>
            </div>
            <div class="header-right">
                <div class="uplink-status">
                    <span class="status-dot pulsing"></span>
                    <span class="status-text">HIVE LINK: ENGAGED</span>
                </div>
                <div class="system-time" id="clock">01:30:00</div>
            </div>
        </header>

        <!-- Main Screen layout -->
        <main class="tactical-viewport">
            <!-- Left Screen: 2D Tactical Map -->
            <section class="screen-panel map-panel">
                <div class="panel-header">
                    <h2>SEC-04 TACTICAL MAP</h2>
                    <span class="panel-tag">GRID GROUND TRUTH</span>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="tacticalCanvas" width="480" height="480"></canvas>
                </div>
                <div class="panel-footer">
                    <span>DRAG ENEMY OR CLICK MAP TO REDEPART SOLDIERS</span>
                </div>
            </section>

            <!-- Right Screen: Selected Soldier's AR Helmet Visor -->
            <section class="screen-panel visor-panel">
                <div class="panel-header">
                    <h2>VISOR AR HUD FEED</h2>
                    <span class="panel-tag">PERSPECTIVE OVERLAY</span>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="visorCanvas" width="480" height="480"></canvas>
                </div>
                <div class="panel-footer">
                    <span>STEER SOLDIER MANUALLY VIA <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>ARROWS</kbd></span>
                </div>
            </section>
        </main>

        <!-- Bottom section: Controls & Logging -->
        <footer class="tactical-footer">
            <!-- Control Dashboard -->
            <div class="control-panel">
                <div class="panel-header">
                    <h3>SYSTEM CONTROLS</h3>
                </div>
                <div class="control-grid">
                    <!-- Column 1: Operator Settings -->
                    <div class="control-group">
                        <label for="soldierSelect">PERSPECTIVE OPERATOR</label>
                        <select id="soldierSelect">
                            <option value="SLD-01" selected>SLD-01</option>
                            <option value="SLD-02">SLD-02</option>
                            <option value="SLD-03">SLD-03</option>
                        </select>
                    </div>

                    <!-- Column 2: Visor Modes -->
                    <div class="control-group check-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="hudToggle" checked>
                            <span class="checkmark"></span>
                            ENABLE HEADSET HUD
                        </label>
                        
                        <label class="checkbox-container">
                            <input type="checkbox" id="autoPatrolCheck">
                            <span class="checkmark"></span>
                            AUTO-PATROL SOLDIER
                        </label>
                    </div>

                    <!-- Column 3: Simulation Parameters -->
                    <div class="control-group check-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="enemyMoveCheck">
                            <span class="checkmark"></span>
                            WANDERING ENEMIES
                        </label>

                        <div class="select-wrapper">
                            <label for="uplinkRateSelect">DATA UPLINK FREQUENCY</label>
                            <select id="uplinkRateSelect">
                                <option value="5">5 Hz (Low Bandwidth)</option>
                                <option value="15" selected>15 Hz (Standard)</option>
                                <option value="30">30 Hz (Tactical High)</option>
                                <option value="60">60 Hz (Real-Time)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Column 4: Command Actions -->
                    <div class="control-group btn-group">
                        <button id="btnSpawnEnemy" class="btn btn-danger">ADD ENEMY TGT</button>
                        <button id="btnSpawnSoldier" class="btn btn-primary">ADD FRIENDLY UNIT</button>
                        <button id="btnReset" class="btn btn-secondary">RESET SIMULATION</button>
                    </div>
                </div>
            </div>

            <!-- Real-time Console Logging -->
            <div class="console-panel">
                <div class="panel-header">
                    <h3>HIVE FUSION CONSOLE</h3>
                    <span class="pulse-indicator">AUTO-SYNCING</span>
                </div>
                <div class="console-feed" id="consoleFeed">
                    <!-- Logs will populate dynamically here -->
                </div>
            </div>
        </footer>
    </div>

    <!-- Clock script for tactical time header -->
    <script>
        setInterval(() => {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('clock').textContent = timeStr;
        }, 1000);
    </script>

    <!-- Simulation Scripts (Relative Paths) -->
    <script src="./js/math.js"></script>
    <script src="./js/map.js"></script>
    <script src="./js/entity.js"></script>
    <script src="./js/renderer.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
